name: Detonate Supply Chain Attack (Simulation)

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  # The malware specifically looks for the default GITHUB_TOKEN to perform the fallback poisoning.
  # We grant write contents permission so the malware *could* theoretically push,
  # allowing us to test detection of the behavior.
  contents: write

jobs:
  simulate-attack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Execute malicious setup script
        # This will trigger the malware embedded in the lightning@2.6.2 package
        run: pip install -r requirements.txt
